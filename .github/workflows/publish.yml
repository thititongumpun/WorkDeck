name: Release desktop builds

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        if: ${{ !startsWith(matrix.platform, 'macos') }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with macOS targets
        if: startsWith(matrix.platform, 'macos')
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "WorkDeck v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  patch-updater-metadata:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download updater metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${GITHUB_REF_NAME}" --pattern latest.json --output latest.json

      - name: Add Windows updater platform alias
        run: |
          jq '
            .platforms as $platforms
            | ($platforms["windows-x86_64-msvc"] // $platforms["windows-x86_64-pc-windows-msvc"]) as $windows
            | if ($platforms["windows-x86_64"] == null and $windows == null) then
                error("No Windows x86_64 updater platform found to alias")
              elif $platforms["windows-x86_64"] == null then
                .platforms["windows-x86_64"] = $windows
              else
                .
              end
          ' latest.json > latest.patched.json
          mv latest.patched.json latest.json
          jq -e '.platforms["windows-x86_64"]' latest.json > /dev/null

      - name: Upload patched updater metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" latest.json --clobber
